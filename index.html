<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Westschnellweg</title>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg: #efe6d6;
      --ink: #243140;
    }

    *{
      box-sizing: border-box;
    }

    html, body{
      margin: 0;
      padding: 0;
    }

    body{
      background: var(--bg);
      color: var(--ink);
      font-family: "IBM Plex Sans", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main{
      max-width: 1200px;
      margin: 70px auto;
      padding: 0 30px;
    }

    .wall{
      font-size: 18px;
      line-height: 1.75;
      letter-spacing: 0.01em;

      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
      hyphens: none;

      margin: 0;
    }

    @media (max-width: 600px){
      main{
        margin: 40px auto;
        padding: 0 18px;
      }

      .wall{
        font-size: 17px;
      }
    }
  </style>
</head>

<body>
  <main>
    <div class="wall">
      PASTE YOUR LONG, LONG TEXT HERE.
      It can be one single paragraph.
      It will wrap automatically.
    </div>
  </main>
</body>
</html>
